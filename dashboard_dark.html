<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Smart Tea Garden - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: 'Roboto', sans-serif; }
        .card { background-color: #2d2d2d; border: 1px solid #404040; margin-bottom: 20px; }
        .card-header { border-bottom: 1px solid #404040; background-color: #333; color: #4CAF50; }
        .val-box { text-align: center; padding: 10px; background: #222; border-radius: 8px; margin-bottom: 10px; }
        .val-title { font-size: 0.8rem; color: #aaa; }
        .val-num { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .weather-banner { background: #0d6efd; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <div class="weather-banner d-flex justify-content-between align-items-center">
            <div>
                <h2 class="m-0">🍵 Smart Tea Garden (Dark)</h2>
                <small id="update-time">Updating...</small>
            </div>
            <div class="text-end">
                <h3 class="m-0" id="w-temp">--°C</h3>
                <span id="w-cond">--</span> | 🌧️ <span id="w-rain">--</span>mm
            </div>
        </div>

        <div class="row" id="main-grid">
            <!-- JS Injected -->
        </div>
    </div>

    <script>
        async function update() {
            const res = await fetch('data.json?t=' + Date.now());
            const data = await res.json();
            
            document.getElementById('update-time').innerText = data.last_update;
            document.getElementById('w-temp').innerText = data.weather.temp + '°C';
            document.getElementById('w-cond').innerText = data.weather.condition;
            document.getElementById('w-rain').innerText = data.weather.rain;

            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            data.stations.forEach(s => {
                grid.innerHTML += `
                <div class="col-md-6 col-lg-3">
                    <div class="card">
                        <div class="card-header fw-bold">${s.name}</div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-6"><div class="val-box"><div class="val-title">TEMP</div><div class="val-num text-danger">${s.temp}°</div></div></div>
                                <div class="col-6"><div class="val-box"><div class="val-title">MOIST</div><div class="val-num text-info">${s.moist}%</div></div></div>
                                <div class="col-6"><div class="val-box"><div class="val-title">EC</div><div class="val-num text-warning">${s.ec}</div></div></div>
                                <div class="col-6"><div class="val-box"><div class="val-title">pH</div><div class="val-num text-success">${s.ph}</div></div></div>
                            </div>
                            <div class="progress mt-2" style="height: 20px;">
                                <div class="progress-bar bg-success" style="width: ${Math.min(s.n, 100)}%">N: ${s.n}</div>
                            </div>
                            <div class="progress mt-1" style="height: 20px;">
                                <div class="progress-bar bg-warning text-dark" style="width: ${Math.min(s.p, 100)}%">P: ${s.p}</div>
                            </div>
                            <div class="progress mt-1" style="height: 20px;">
                                <div class="progress-bar bg-danger" style="width: ${Math.min(s.k, 100)}%">K: ${s.k}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
