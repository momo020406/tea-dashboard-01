<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tea Garden Visual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>📊 Soil Analytics View</h2>
        <p class="text-muted" id="timestamp">Loading...</p>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">Moisture Comparison</div>
                    <div class="card-body">
                        <canvas id="moistChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">NPK Nutrient Levels</div>
                    <div class="card-body">
                        <canvas id="npkChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function renderCharts() {
            const res = await fetch('data.json?t=' + Date.now());
            const data = await res.json();
            
            document.getElementById('timestamp').innerText = 'Last Update: ' + data.last_update;

            const labels = data.stations.map(s => s.name);
            const moistData = data.stations.map(s => s.moist);
            
            // Moisture Chart
            new Chart(document.getElementById('moistChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Soil Moisture (%)',
                        data: moistData,
                        backgroundColor: 'rgba(54, 162, 235, 0.6)'
                    }]
                }
            });

            // NPK Stacked
            new Chart(document.getElementById('npkChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Nitrogen', data: data.stations.map(s => s.n), backgroundColor: '#28a745' },
                        { label: 'Phosphorus', data: data.stations.map(s => s.p), backgroundColor: '#ffc107' },
                        { label: 'Potassium', data: data.stations.map(s => s.k), backgroundColor: '#dc3545' }
                    ]
                },
                options: {
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
        }
        renderCharts();
    </script>
</body>
</html>
