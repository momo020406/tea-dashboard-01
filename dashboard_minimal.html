<!DOCTYPE html>
<html>
<head>
    <title>Tea Garden Minimal</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; }
        th { background: #eee; }
        .status-ok { color: green; }
        .status-alert { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📋 Tea Garden Raw Data</h1>
    <div id="meta"></div>
    <table id="data-table">
        <thead>
            <tr>
                <th>Station</th>
                <th>Temp (°C)</th>
                <th>Moisture (%)</th>
                <th>EC (us/cm)</th>
                <th>pH</th>
                <th>N (mg/kg)</th>
                <th>P (mg/kg)</th>
                <th>K (mg/kg)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => {
                document.getElementById('meta').innerHTML = `
                    <strong>Weather:</strong> ${d.weather.location} | ${d.weather.temp}°C | Rain: ${d.weather.rain}mm<br>
                    <small>Updated: ${d.last_update}</small>
                `;
                const tbody = document.querySelector('#data-table tbody');
                d.stations.forEach(s => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${s.name}</td>
                            <td>${s.temp}</td>
                            <td>${s.moist}</td>
                            <td>${s.ec}</td>
                            <td>${s.ph}</td>
                            <td>${s.n}</td>
                            <td>${s.p}</td>
                            <td>${s.k}</td>
                        </tr>
                    `;
                });
            });
    </script>
</body>
</html>
