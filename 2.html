<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tea Garden · 經典儀表板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background:#f7f9fb; font-family:"Segoe UI","Noto Sans TC",sans-serif; }
        .hero { background:linear-gradient(120deg,#2e7d32,#66bb6a); color:#fff; padding:2.5rem 0; }
        .hero h1 { font-weight:700; }
        .hero small { opacity:.8; }
        .weather-card { border-radius:20px; background:#fff; box-shadow:0 20px 40px rgba(18,92,44,.1); padding:2rem; }
        .station-card { border-radius:18px; background:#fff; box-shadow:0 12px 24px rgba(0,0,0,.05); padding:1.5rem; }
        .metric-row { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid #eef1f4; }
        .metric-row:last-child { border-bottom:none; }
        .metric-label { color:#60738c; display:flex; align-items:center; gap:.5rem; }
        .metric-value { font-weight:600; color:#0f172a; }
        .badge-online { background:rgba(46,125,50,.15); color:#1b5e20; }
        .badge-offline { background:#e2e8f0; color:#64748b; }
    </style>
</head>
<body>
    <section class="hero text-center">
        <div class="container">
            <h1><i class="fa-solid fa-leaf me-2"></i>Smart Tea Garden</h1>
            <p class="lead mb-0">RS485 → Logger → PostgreSQL → Google Sheets → GitHub Dashboard</p>
            <small id="last-update">最後更新載入中…</small>
        </div>
    </section>

    <main class="container py-5">
        <div class="weather-card mb-4">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h3 class="mb-1"><i class="fa-solid fa-location-dot text-warning me-2"></i><span id="weather-location">南投 名間鄉</span></h3>
                    <p class="text-muted mb-0">資料來源：CWA C0I410 自動測站</p>
                    <p class="text-muted mb-0">天氣狀況：<span id="weather-desc">--</span></p>
                </div>
                <div class="col-md-6 text-md-end mt-4 mt-md-0">
                    <div class="display-4 fw-bold"><span id="weather-temp">--</span><span class="fs-5">°C</span></div>
                    <div class="text-muted">濕度 <span id="weather-hum">--</span>% ｜ 降雨 <span id="weather-rain">--</span> mm</div>
                    <small class="text-muted">觀測時間：<span id="weather-time">--</span></small>
                </div>
            </div>
        </div>

        <div class="row g-4" id="station-grid"></div>
    </main>

    <footer class="text-center pb-4 text-muted"><small>© 2026 Smart Tea Garden · 更新間隔 60 秒</small></footer>

    <script src="assets/dashboard-data.js"></script>
    <script>
        const STATION_ORDER = [1, 2, 3, 4];

        function renderDashboard(data) {
            if (!data || !data.sensors) {
                showError("data.json 尚未生成或沒有任何感測資料。");
                return;
            }

            const weather = data.weather || {};
            document.getElementById("last-update").textContent = data.last_update || "--";
            document.getElementById("weather-location").textContent = weather.location || "南投 名間鄉";
            document.getElementById("weather-desc").textContent = weather.weather || "--";
            document.getElementById("weather-temp").textContent = dashboardData.formatNumber(weather.air_temp);
            document.getElementById("weather-hum").textContent = dashboardData.formatNumber(weather.humidity);
            document.getElementById("weather-rain").textContent = dashboardData.formatNumber(weather.rainfall);
            document.getElementById("weather-time").textContent = weather.obs_time || "--";

            const grid = document.getElementById("station-grid");
            grid.innerHTML = "";
            STATION_ORDER.forEach((id) => {
                const reading = dashboardData.station(data, id);
                const badge = reading ? '<span class="badge badge-online">Online</span>' : '<span class="badge badge-offline">Offline</span>';
                grid.insertAdjacentHTML(
                    "beforeend",
                    `<div class="col-12 col-md-6 col-xl-3">
                        <div class="station-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0"><i class="fa-solid fa-tower-observation text-success me-2"></i>Station ${id}</h5>
                                ${badge}
                            </div>
                            ${buildMetricList(reading)}
                        </div>
                    </div>`
                );
            });
        }

        function buildMetricList(reading) {
            const metrics = [
                { label: "土壤溫度 (°C)", icon: "fa-temperature-half", value: reading && reading.soil_temp },
                { label: "土壤濕度 (%)", icon: "fa-droplet", value: reading && reading.soil_moisture },
                { label: "導電度 EC", icon: "fa-bolt", value: reading && reading.ec },
                { label: "酸鹼值 pH", icon: "fa-flask", value: reading && reading.ph },
                { label: "氮 N", icon: "fa-seedling", value: reading && reading.n },
                { label: "磷 P", icon: "fa-leaf", value: reading && reading.p },
                { label: "鉀 K", icon: "fa-apple-whole", value: reading && reading.k },
            ];
            return metrics
                .map(
                    (m) => `
                <div class="metric-row">
                    <span class="metric-label"><i class="fa-solid ${m.icon}"></i>${m.label}</span>
                    <span class="metric-value">${dashboardData.formatNumber(m.value)}</span>
                </div>`
                )
                .join("");
        }

        function showError(msg) {
            document.getElementById("station-grid").innerHTML = `
                <div class="col-12">
                    <div class="station-card text-center text-danger py-5">
                        <i class="fa-solid fa-circle-exclamation fa-2x mb-3"></i>
                        <p class="mb-0">${msg}</p>
                    </div>
                </div>`;
            document.getElementById("last-update").textContent = "--";
        }

        dashboardData.startPolling({ render: renderDashboard, onError: () => showError("無法下載 data.json。") });
    </script>
</body>
</html>
