<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tea Garden Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #eef; }
        .mobile-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.2em; font-weight: bold; color: #333; }
        .stat-name { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">📱 Tea Garden Mobile</h2>
    <div id="content">Loading...</div>

    <script>
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => {
                const c = document.getElementById('content');
                c.innerHTML = `
                    <div class="mobile-card" style="background:#e3f2fd;">
                        <div class="header"><strong>🌤️ ${d.weather.location}</strong></div>
                        <div>${d.weather.temp}°C, ${d.weather.condition}</div>
                    </div>
                `;
                d.stations.forEach(s => {
                    c.innerHTML += `
                        <div class="mobile-card">
                            <div class="header"><strong>🌱 ${s.name}</strong></div>
                            <div class="stat-grid">
                                <div class="stat-item"><div class="stat-val">${s.temp}°</div><div class="stat-name">Temp</div></div>
                                <div class="stat-item"><div class="stat-val">${s.moist}%</div><div class="stat-name">Moist</div></div>
                                <div class="stat-item"><div class="stat-val">${s.ec}</div><div class="stat-name">EC</div></div>
                                <div class="stat-item"><div class="stat-val">${s.ph}</div><div class="stat-name">pH</div></div>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
