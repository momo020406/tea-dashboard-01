<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞成智慧茶園 Smart Tea Garden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-header { background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%); color: white; padding: 2rem; border-radius: 15px; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .station-card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .station-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-header { background-color: #4CAF50 !important; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .metric-group { background: #f8f9fa; border-radius: 8px; padding: 10px; margin-bottom: 10px; text-align: center; }
        .metric-label { font-size: 0.85rem; color: #6c757d; font-weight: 600; text-transform: uppercase; }
        .metric-value { font-size: 1.4rem; font-weight: bold; color: #333; }
        .weather-info { font-size: 1.2rem; }
        .update-time { font-size: 0.9rem; opacity: 0.8; }
        .sensor-icon { width: 25px; color: #4CAF50; }
        .npk-bar { height: 10px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Dashboard Header & Weather -->
        <div class="dashboard-header">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="mb-1"><i class="fas fa-leaf text-success"></i> 瑞成智慧茶園</h1>
                    <p class="mb-0">Smart Tea Garden (rt)</p>
                    <div class="update-time mt-2"><i class="far fa-clock"></i> 最後更新: <span id="last-update">--</span></div>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <div class="weather-info">
                        <strong><i class="fas fa-map-marker-alt"></i> <span id="location">載入中...</span></strong>
                        <span class="mx-2">|</span>
                        <i class="fas fa-cloud"></i> <span id="weather-cond">--</span>
                    </div>
                    <div class="weather-info mt-2">
                        <span class="badge bg-light text-dark mx-1"><i class="fas fa-thermometer-half"></i> 氣溫: <span id="weather-temp">--</span>°C</span>
                        <span class="badge bg-light text-dark mx-1"><i class="fas fa-tint"></i> 濕度: <span id="weather-humid">--</span>%</span>
                        <span class="badge bg-light text-dark mx-1"><i class="fas fa-cloud-rain"></i> 降雨: <span id="weather-rain">--</span>mm</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sensors Grid -->
        <div class="row" id="stations-container">
            <div class="col-12 text-center text-muted my-5">
                <div class="spinner-border text-success" role="status"></div>
                <div class="mt-2">讀取即時資料 (Smart Tea Garden rt)...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchRealtimeData() {
            try {
                const response = await fetch('rt_data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                // Update Weather & Meta
                document.getElementById('location').innerText = data.weather.location;
                document.getElementById('weather-cond').innerText = data.weather.condition;
                document.getElementById('weather-temp').innerText = data.weather.temp;
                document.getElementById('weather-humid').innerText = data.weather.humidity;
                document.getElementById('weather-rain').innerText = data.weather.rain;
                document.getElementById('last-update').innerText = data.last_update;

                // Update Stations
                const container = document.getElementById('stations-container');
                container.innerHTML = ''; 

                data.stations.forEach(st => {
                    const html = `
                    <div class="col-md-6 col-xl-3 mb-4">
                        <div class="card station-card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span class="fs-5">${st.name}</span>
                                <i class="fas fa-broadcast-tower text-white-50"></i>
                            </div>
                            <div class="card-body">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="metric-group">
                                            <div class="metric-label"><i class="fas fa-temperature-low sensor-icon"></i> Temp</div>
                                            <div class="metric-value text-danger">${st.temp}<small>°C</small></div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-group">
                                            <div class="metric-label"><i class="fas fa-water sensor-icon text-info"></i> Moist</div>
                                            <div class="metric-value text-info">${st.moist}<small>%</small></div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-group">
                                            <div class="metric-label"><i class="fas fa-bolt sensor-icon text-warning"></i> EC</div>
                                            <div class="metric-value text-warning">${st.ec}</div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-group">
                                            <div class="metric-label"><i class="fas fa-flask sensor-icon text-primary"></i> pH</div>
                                            <div class="metric-value text-primary">${st.ph}</div>
                                        </div>
                                    </div>
                                </div>
                                <hr class="my-3 text-muted">
                                <h6 class="text-center text-muted mb-3"><i class="fas fa-leaf text-success"></i> NPK Nutrients</h6>
                                <div class="row g-2 text-center">
                                    <div class="col-4">
                                        <div class="metric-label">Nitrogen</div>
                                        <div class="fw-bold fs-5">${st.n}</div>
                                        <div class="progress npk-bar"><div class="progress-bar bg-success" style="width: ${Math.min(st.n, 100)}%"></div></div>
                                    </div>
                                    <div class="col-4">
                                        <div class="metric-label">Phosphorus</div>
                                        <div class="fw-bold fs-5">${st.p}</div>
                                        <div class="progress npk-bar"><div class="progress-bar bg-warning" style="width: ${Math.min(st.p, 100)}%"></div></div>
                                    </div>
                                    <div class="col-4">
                                        <div class="metric-label">Potassium</div>
                                        <div class="fw-bold fs-5">${st.k}</div>
                                        <div class="progress npk-bar"><div class="progress-bar bg-danger" style="width: ${Math.min(st.k, 100)}%"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                    container.innerHTML += html;
                });

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        fetchRealtimeData();
        setInterval(fetchRealtimeData, 30000); // 30s 刷新
    </script>
</body>
</html>
