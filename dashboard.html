<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tea Garden Dashboard 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border: none; }
        .weather-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .station-card { transition: transform 0.2s; }
        .station-card:hover { transform: translateY(-5px); }
        .metric-value { font-size: 1.5rem; font-weight: bold; }
        .metric-label { font-size: 0.9rem; color: #6c757d; }
        .refresh-time { font-size: 0.8rem; color: #888; text-align: right; margin-top: 10px; }
        .sensor-icon { width: 30px; text-align: center; margin-right: 5px; color: #28a745; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4 text-center"><i class="fas fa-leaf text-success"></i> Smart Tea Garden Monitor (Style 1)</h1>
        
        <!-- Weather Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card weather-card p-4">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <h3><i class="fas fa-map-marker-alt"></i> <span id="location">Loading...</span></h3>
                            <p id="weather-time">--</p>
                        </div>
                        <div class="col-md-4 text-center">
                            <div class="display-4"><i class="fas fa-cloud-sun"></i> <span id="weather-cond">--</span></div>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex justify-content-between">
                                <span><i class="fas fa-thermometer-half"></i> Temp: <strong id="weather-temp">--</strong>°C</span>
                                <span><i class="fas fa-tint"></i> Humid: <strong id="weather-humid">--</strong>%</span>
                            </div>
                            <div class="mt-2">
                                <span><i class="fas fa-cloud-rain"></i> Rain: <strong id="weather-rain">--</strong>mm</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stations Grid -->
        <div class="row" id="stations-container">
            <!-- Station cards injected by JS -->
            <div class="col-12 text-center text-muted">Loading sensor data...</div>
        </div>
        
        <div class="refresh-time">Last Update: <span id="last-update">--</span></div>
    </div>

    <script>
        async function fetchData() {
            try {
                // Fetch the data.json generated by the logger
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                // Update Weather
                document.getElementById('location').innerText = data.weather.location;
                document.getElementById('weather-cond').innerText = data.weather.condition;
                document.getElementById('weather-temp').innerText = data.weather.temp;
                document.getElementById('weather-humid').innerText = data.weather.humidity;
                document.getElementById('weather-rain').innerText = data.weather.rain;
                document.getElementById('weather-time').innerText = data.weather.time;
                document.getElementById('last-update').innerText = data.last_update;

                // Update Stations
                const container = document.getElementById('stations-container');
                container.innerHTML = ''; // Clear loading

                data.stations.forEach(st => {
                    const html = `
                    <div class="col-md-6 col-lg-3">
                        <div class="card station-card h-100">
                            <div class="card-header bg-success text-white">
                                <h5 class="m-0">${st.name}</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="metric-label"><i class="fas fa-temperature-low sensor-icon"></i>Temp</div>
                                        <div class="metric-value">${st.temp}°C</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-label"><i class="fas fa-water sensor-icon"></i>Moist</div>
                                        <div class="metric-value">${st.moist}%</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-label"><i class="fas fa-bolt sensor-icon"></i>EC</div>
                                        <div class="metric-value">${st.ec}</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-label"><i class="fas fa-flask sensor-icon"></i>pH</div>
                                        <div class="metric-value">${st.ph}</div>
                                    </div>
                                    <div class="col-12"><hr></div>
                                    <div class="col-4 text-center">
                                        <div class="metric-label">N</div>
                                        <div class="fw-bold">${st.n}</div>
                                    </div>
                                    <div class="col-4 text-center">
                                        <div class="metric-label">P</div>
                                        <div class="fw-bold">${st.p}</div>
                                    </div>
                                    <div class="col-4 text-center">
                                        <div class="metric-label">K</div>
                                        <div class="fw-bold">${st.k}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                    container.innerHTML += html;
                });

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Initial load
        fetchData();
        // Refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
